<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#f8fbff" />
    <title>Wallet sin conexión</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom)); background: #f8fbff; color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(100%, 420px); padding: 28px; border: 1px solid rgba(255,255,255,.8); border-radius: 24px; background: rgba(255,255,255,.78); box-shadow: 0 20px 60px rgba(15,23,42,.12); text-align: center; }
      img { width: 72px; height: 72px; border-radius: 20px; }
      h1 { margin: 18px 0 8px; font-size: 28px; }
      p { margin: 0; color: #64748b; line-height: 1.5; }
      button { margin-top: 20px; min-height: 44px; border: 0; border-radius: 999px; padding: 0 20px; background: #0a84ff; color: white; font: inherit; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/wallet-icon-192.png" alt="Wallet" />
      <h1>Sin conexión</h1>
      <p>Vuelve a conectarte para actualizar tus saldos y movimientos.</p>
      <button type="button" onclick="location.reload()">Reintentar</button>
    </main>
  </body>
</html>
